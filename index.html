<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九州秘境與名城：四日自駕與鐵道巡禮</title>
    <script src="tailwind.js"></script>
    <script src="chart.js"></script>
    <style>
        /* Custom Styles for Timeline and Chart Container */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fdfbf7; /* Warm neutral background */
            color: #3f3e3a;
        }

        /* Timeline styling */
        .timeline-container {
            position: relative;
        }
        .timeline-container::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 24px; /* Adjust based on dot size */
            width: 2px;
            background-color: #e5e7eb;
            z-index: 0;
        }
        @media (min-width: 768px) {
            .timeline-container::before {
                left: 140px; /* Shift line for desktop */
            }
        }

        /* Chart Container Strict Constraints */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }
        @media (min-width: 768px) {
            .chart-container {
                height: 350px;
            }
        }

        /* Custom Scrollbar for inner elements if needed */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="antialiased selection:bg-[#d97757] selection:text-white pb-20">

    <!-- Header / Hero -->
    <header class="bg-[#3f3e3a] text-[#fdfbf7] py-16 px-6 text-center shadow-lg relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
        <div class="max-w-4xl mx-auto relative z-10">
            <h1 class="text-3xl md:text-5xl font-bold mb-4 tracking-wider">九州絕景四日遊</h1>
            <p class="text-lg md:text-xl text-gray-300 mb-6">神話之鄉、壯麗火山與歷史名城的交織之旅</p>
            <div class="flex flex-wrap justify-center gap-3 text-sm md:text-base">
                <span class="bg-[#d97757] text-white px-4 py-1 rounded-full shadow">🚗 自駕 + 🚃 鐵道</span>
                <span class="bg-[#8c9c80] text-white px-4 py-1 rounded-full shadow">宮崎 ➔ 熊本 ➔ 佐賀</span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 mt-[-2rem] relative z-20">

        <!-- Interactive Itinerary Section -->
        <section id="itinerary-section" class="bg-white rounded-2xl shadow-md overflow-hidden">
            
            <!-- Day Navigation -->
            <nav class="bg-gray-50 border-b border-gray-200 p-4 overflow-x-auto">
                <ul class="flex space-x-2 md:space-x-4 min-w-max justify-center md:justify-start" id="day-tabs">
                    <!-- Tabs generated by JS -->
                </ul>
            </nav>

            <!-- Itinerary Content Area -->
            <div class="p-6 md:p-10 bg-white" id="itinerary-content">
                <!-- Content injected by JS -->
            </div>

        </section>
    </main>

    <!-- JavaScript Logic -->
    <script>
        // --- Data Storage: Itinerary Data ---
        const itineraryData = [
            {
                day: 1,
                title: "神話海岸與夜神樂",
                route: "宮崎機場 ➔ 日南海岸 ➔ 高千穗",
                transport: "租車自駕",
                hotel: "Hotel Grateful 高千穗",
                hotelMap: "Hotel Grateful Takachiho",
                events: [
                    { time: "11:00", loc: "宮崎機場", title: "抵達與租車", desc: "抵達宮崎機場，辦理租車手續，準備展開旅程。", icon: "🛬", map: "宮崎機場" },
                    { time: "12:00", loc: "宮崎市區", title: "享用在地午餐", desc: "推薦品嚐宮崎名物：南蠻雞或宮崎牛燒肉。", icon: "🍽️", map: "宮崎車站" },
                    { time: "13:00", loc: "青島神社", title: "海之守護神", desc: "（行程優化：順路先訪）座落於小島上的神社，周圍環繞著奇特的波狀岩石「鬼之洗衣板」。", icon: "⛩️", map: "青島神社" },
                    { time: "14:30", loc: "鵜戶神宮", title: "絕壁上的朱紅神宮", desc: "沿著日南海岸行駛，參訪建於海邊岩洞中、祈求結緣與安產的奇特神宮。試著將「運玉」投入龜石中試試手氣！", icon: "⛩️", map: "鵜戶神宮" },
                    { time: "16:00", loc: "日南太陽花園", title: "摩艾石像群", desc: "欣賞世界上唯一獲得復活節島長老授權復刻的七座摩艾石像，搭配無敵海景。", icon: "🗿", map: "Sunmesse Nichinan" },
                    { time: "17:00", loc: "驅車北上", title: "前往高千穗", desc: "注意：從日南地區開車至高千穗距離較遠（約需2.5~3小時），建議準備好車上音樂，沿途欣賞風景。", icon: "🚗", map: "" },
                    { time: "19:30", loc: "高千穗", title: "抵達與晚餐", desc: "抵達高千穗地區，於旅館辦理入住或在附近簡單用餐。", icon: "🏨", map: "" },
                    { time: "20:00", loc: "高千穗神社", title: "高千穗夜神樂", desc: "前往神社神樂殿欣賞傳承百年的傳統神樂舞，感受日本神話的神秘氛圍（需事先購票）。", icon: "🎭", map: "高千穗神社" }
                ]
            },
            {
                day: 2,
                title: "峽谷絕景與壯麗火山",
                route: "高千穗 ➔ 阿蘇 ➔ 熊本市區",
                transport: "租車自駕 ➔ 市區步行",
                hotel: "SOTETSU GRAND FRESA KUMAMOTO",
                hotelMap: "SOTETSU GRAND FRESA KUMAMOTO",
                events: [
                    { time: "09:00", loc: "高千穗峽", title: "峽谷划船與散步", desc: "租借小船仰望真名井瀑布，或沿著步道漫步，欣賞柱狀節理的壯麗峽谷風光。", icon: "🛶", map: "高千穗峽" },
                    { time: "11:30", loc: "阿蘇", title: "驅車前往阿蘇地區", desc: "沿著山路行駛，風景將從峽谷轉變為廣闊的火山地貌。", icon: "🚗", map: "" },
                    { time: "12:30", loc: "阿蘇中岳火山口", title: "近距離感受地球呼吸", desc: "搭乘接駁車或自駕直達火山口邊緣，觀看冒著白煙的壯觀景象（需視當日火山警戒發布狀況而定）。", icon: "🌋", map: "阿蘇中岳火山口" },
                    { time: "14:00", loc: "草千里之濱", title: "大草原騎馬散步", desc: "在廣闊的草原上悠閒散步或體驗騎馬，背景是雄偉的阿蘇烏帽子岳。", icon: "🐎", map: "草千里之濱" },
                    { time: "15:30", loc: "大觀峰展望所", title: "俯瞰阿蘇盆地", desc: "阿蘇外輪山的最高峰，擁有360度全景視野。若運氣好且天氣條件允許，早晨或傍晚有機會看到雲海。", icon: "☁️", map: "大觀峰" },
                    { time: "17:30", loc: "熊本市區 (大甲橋)", title: "歸還租賃車輛", desc: "抵達熊本市區。前往 TOYOTA Rent a Car 大甲橋店 (Daikobashi Branch) 完成還車手續，結束自駕行程。", icon: "🔑", map: "Toyota Rent a Car Daikobashi" },
                    { time: "18:30", loc: "熊本市區", title: "飯店 Check-in", desc: "前往飯店辦理入住，稍作休息。", icon: "🏨", map: "SOTETSU GRAND FRESA KUMAMOTO" },
                    { time: "19:30", loc: "熊本城周邊", title: "夜間點燈外觀欣賞", desc: "散步前往熊本城周圍，欣賞夜晚打上燈光、莊嚴而美麗的天守閣外觀。", icon: "🏯", map: "熊本城" }
                ]
            },
            {
                day: 3,
                title: "名城巡禮與螢火蟲之夜",
                route: "熊本 ➔ 佐賀 ➔ 小城市",
                transport: "大眾運輸 (JR/新幹線)",
                hotel: "東橫INN 佐賀站前",
                hotelMap: "Toyoko Inn Saga Ekimae",
                events: [
                    { time: "09:00", loc: "熊本城", title: "天守閣參觀", desc: "進入經歷地震後修復重生的熊本城天守閣參觀，了解其堅固的防禦構造與歷史。", icon: "🏯", map: "熊本城" },
                    { time: "11:00", loc: "櫻之馬場 城彩苑", title: "江戶風情街區", desc: "在充滿歷史氛圍的商店街選購伴手禮，品嚐熊本名產如芥末蓮藕、即食糰子。", icon: "🛍️", map: "櫻之馬場 城彩苑" },
                    { time: "12:30", loc: "通町筋商圈", title: "熊本名物：馬肉料理午餐", desc: "來到熊本必吃的代表性美食！<br><br><b>💡 嚴選推薦餐廳：</b><br>1. <b>菅乃屋 (上通店)</b>：熊本最知名的馬肉專賣老字號，午間套餐CP值極高，必點鮮甜的「馬肉刺身 (馬刺し)」與烤馬肉。<br>2. <b>馬櫻 (下通店)</b>：提供精緻的馬肉涮涮鍋與燒肉，肉質極佳且用餐環境舒適。<br><br><span class='text-[#d97757] text-xs'>*貼心提醒：名店午餐時段人潮多，建議提早前往或請前一晚的飯店協助致電預約。</span>", icon: "🥩", map: "菅乃屋 上通店" },
                    { time: "14:30", loc: "熊本車站", title: "搭乘列車前往佐賀", desc: "搭乘新幹線或特急列車前往佐賀車站（車程約1~1.5小時）。", icon: "🚄", map: "JR佐賀站" },
                    { time: "16:00", loc: "佐賀城本丸歷史館", title: "日本最大木造復原建築", desc: "參觀將幕末時期佐賀城本丸御殿復原的歷史館，走在寬闊的榻榻米走廊上感受歷史。", icon: "🏛️", map: "佐賀城本丸歷史館" },
                    { time: "17:30", loc: "佐賀縣廳展望廳", title: "SAGA360 展望", desc: "前往縣廳頂樓的免費展望台，欣賞佐賀市區的夕陽與夜景，偶爾會有光雕投影展覽。", icon: "🌇", map: "佐賀縣廳" },
                    { time: "19:30", loc: "小城市 祇園川", title: "夢幻螢火蟲觀賞", desc: "(季節限定:5月下旬-6月上旬) 搭車前往小城市的祇園川，這裡是日本著名的賞螢名所，欣賞數以萬計的源氏螢在水畔飛舞。", icon: "✨", map: "祇園川" }
                ]
            },
            {
                day: 4,
                title: "滿載賦歸",
                route: "佐賀市區 ➔ 佐賀機場",
                transport: "機場巴士/計程車",
                hotel: "",
                hotelMap: "",
                events: [
                    { time: "08:00", loc: "佐賀站前", title: "前往佐賀機場", desc: "從佐賀站前搭乘直達巴士或計程車前往九州佐賀國際機場。", icon: "🚌", map: "九州佐賀國際機場" },
                    { time: "09:00", loc: "佐賀機場", title: "報到與免稅購物", desc: "辦理登機手續，在機場免稅店做最後的採購，帶著滿滿的回憶準備搭機返家。", icon: "✈️", map: "九州佐賀國際機場" }
                ]
            }
        ];

        // --- State Management ---
        let currentDayIndex = 0;

        // --- Core Functions ---

        // 1. Generate Navigation Tabs
        function renderTabs() {
            const tabsContainer = document.getElementById('day-tabs');
            tabsContainer.innerHTML = '';
            
            itineraryData.forEach((data, index) => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = `px-5 py-2.5 rounded-full text-sm md:text-base font-semibold transition-colors duration-200 focus:outline-none whitespace-nowrap ${index === currentDayIndex ? 'bg-[#d97757] text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'}`;
                btn.innerText = `Day ${data.day}`;
                btn.onclick = () => {
                    currentDayIndex = index;
                    renderTabs(); // Re-render to update active styling
                    renderDayContent();
                };
                li.appendChild(btn);
                tabsContainer.appendChild(li);
            });
        }

        // 2. Generate Google Maps App Link (Modified for Offline/Native App triggering)
        function getMapLink(query) {
            if(!query) return '';
            
            const encodedQuery = encodeURIComponent(query);
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // 判斷是否為 iOS 設備，使用 comgooglemaps:// 協議直接喚醒 App
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                return `comgooglemaps://?q=${encodedQuery}`;
            }
            // 判斷是否為 Android 設備，使用 geo: 協議直接喚醒地圖 App
            else if (/android/i.test(userAgent)) {
                return `geo:0,0?q=${encodedQuery}`;
            }
            // 若為桌面版或其他環境，則保留原本的網頁連結做為備案
            return `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;
        }

        // 3. Render Content for Selected Day
        function renderDayContent() {
            const contentContainer = document.getElementById('itinerary-content');
            const data = itineraryData[currentDayIndex];

            let html = `
                <div class="mb-8 border-b border-gray-100 pb-6">
                    <h3 class="text-2xl md:text-3xl font-bold text-[#3f3e3a] mb-2">${data.title}</h3>
                    <div class="flex flex-col sm:flex-row gap-2 sm:gap-6 text-gray-600 text-sm md:text-base">
                        <span class="flex items-center gap-1">🗺️ ${data.route}</span>
                        <span class="flex items-center gap-1">🚆 ${data.transport}</span>
                    </div>
                </div>
                
                <div class="timeline-container">
            `;

            data.events.forEach((event) => {
                const mapBtnHtml = event.map ? 
                    `<a href="${getMapLink(event.map)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 mt-3 px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs rounded-lg transition-colors border border-gray-200">
                        📍 查看地圖
                    </a>` : '';

                html += `
                    <div class="relative flex flex-col md:flex-row items-start mb-10 group">
                        <!-- Timeline Dot -->
                        <div class="absolute left-[24px] md:left-[140px] w-4 h-4 rounded-full bg-[#8c9c80] border-4 border-white transform -translate-x-1/2 mt-1.5 z-10 group-hover:scale-125 transition-transform duration-300 shadow-sm"></div>
                        
                        <!-- Time -->
                        <div class="md:w-[120px] pt-1 pl-12 md:pl-0 pr-4 md:text-right font-bold text-[#d97757] shrink-0 text-lg mb-1 md:mb-0">
                            ${event.time}
                        </div>
                        
                        <!-- Content Card -->
                        <div class="flex-grow pl-12 md:pl-10">
                            <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-xl">${event.icon}</span>
                                    <h4 class="text-lg font-bold text-gray-800">${event.title}</h4>
                                </div>
                                <div class="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">${event.loc}</div>
                                <p class="text-gray-600 text-sm leading-relaxed">${event.desc}</p>
                                ${mapBtnHtml}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div>`; // Close timeline-container

            // Hotel Info
            if (data.hotel) {
                html += `
                    <div class="mt-8 pt-6 border-t border-gray-100 bg-stone-50 rounded-xl p-5 border border-stone-200">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">🏨</span>
                            <div>
                                <div class="text-xs text-gray-500 font-bold mb-1">今日住宿</div>
                                <div class="font-bold text-gray-800 text-lg">${data.hotel}</div>
                                <a href="${getMapLink(data.hotelMap)}" target="_blank" class="text-sm text-[#d97757] hover:underline mt-1 inline-block">在 Google Maps 上查看路線 &rarr;</a>
                            </div>
                        </div>
                    </div>
                `;
            }

            contentContainer.innerHTML = html;
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderTabs();
            renderDayContent();
        });

    </script>
</body>
</html>
